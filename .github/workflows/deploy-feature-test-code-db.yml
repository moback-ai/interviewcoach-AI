name: Deploy Feature Branch

on:
  push:
    branches:
      - feature/test-code-DB
  workflow_dispatch:
    inputs:
      deploy_target:
        description: Which part should be deployed?
        required: true
        default: all
        type: choice
        options:
          - all
          - frontend
          - backend
          - database

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed areas
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
            database:
              - 'database/**'

      - name: Resolve deployment targets
        id: targets
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            target="${{ github.event.inputs.deploy_target }}"
            case "$target" in
              all)
                frontend=true
                backend=true
                database=true
                ;;
              frontend)
                frontend=true
                backend=false
                database=false
                ;;
              backend)
                frontend=false
                backend=true
                database=false
                ;;
              database)
                frontend=false
                backend=false
                database=true
                ;;
            esac
          else
            frontend="${{ steps.changes.outputs.frontend }}"
            backend="${{ steps.changes.outputs.backend }}"
            database="${{ steps.changes.outputs.database }}"
          fi

          echo "frontend=$frontend" >> "$GITHUB_OUTPUT"
          echo "backend=$backend" >> "$GITHUB_OUTPUT"
          echo "database=$database" >> "$GITHUB_OUTPUT"
          echo "Detected targets -> frontend=$frontend backend=$backend database=$database"

      - name: Setup Node
        if: steps.targets.outputs.frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: current

      - name: Build frontend
        if: steps.targets.outputs.frontend == 'true'
        working-directory: frontend
        run: |
          echo "VITE_API_BASE_URL=/api" > .env
          echo "VITE_STORAGE_URL=/storage" >> .env
          npm install --legacy-peer-deps
          npm run build

      - name: Require Govardhan approval for non-owner pushes
        if: github.event_name == 'push' && github.actor != 'govardhanreddy66'
        run: |
          echo "This push was made by ${{ github.actor }}."
          echo "Build completed, but deployment is blocked until Govardhan manually approves by running this workflow."

      - name: Mark deploy as approved
        if: github.event_name == 'workflow_dispatch' || github.actor == 'govardhanreddy66'
        run: echo "Deployment approved for actor ${{ github.actor }}."

      - name: Setup SSH
        if: github.event_name == 'workflow_dispatch' || github.actor == 'govardhanreddy66'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key.pem
          chmod 400 ~/.ssh/deploy_key.pem

      - name: Define SSH options
        if: github.event_name == 'workflow_dispatch' || github.actor == 'govardhanreddy66'
        run: |
          echo 'SSH_OPTS=-i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=15' >> "$GITHUB_ENV"

      - name: Sync backend source
        if: (github.event_name == 'workflow_dispatch' || github.actor == 'govardhanreddy66') && steps.targets.outputs.backend == 'true'
        run: |
          rsync -avz --delete \
            -e "ssh $SSH_OPTS" \
            backend/ \
            ${{ secrets.EC2_USER }}@${{ secrets.BACKEND_HOST }}:/apps/backend/

      - name: Configure backend and restart
        if: (github.event_name == 'workflow_dispatch' || github.actor == 'govardhanreddy66') && steps.targets.outputs.backend == 'true'
        run: |
          ssh $SSH_OPTS ${{ secrets.EC2_USER }}@${{ secrets.BACKEND_HOST }} <<'EOFSSH'
          set -e
          APP_DOMAIN="${{ secrets.FRONTEND_DOMAIN }}"
          PUBLIC_ORIGIN="http://${{ secrets.FRONTEND_HOST }}"
          if [ -n "$APP_DOMAIN" ]; then
            PUBLIC_ORIGIN="https://$APP_DOMAIN"
          fi
          cat > /apps/backend/.env <<ENVEOF
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          DOMAIN=$PUBLIC_ORIGIN
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          SMTP_USE_SSL=${{ secrets.SMTP_USE_SSL }}
          MAIL_FROM=${{ secrets.MAIL_FROM }}
          STORAGE_PATH=/apps/storage
          PUBLIC_STORAGE_URL=$PUBLIC_ORIGIN/storage
          WHISPER_MODEL=base
          UPLOAD_FOLDER=/apps/storage
          MAX_CONTENT_MB=200
          BACKEND_API_BASE=http://127.0.0.1:5000
          ENVEOF
          cd /apps/backend
          if [ ! -d venv ]; then python3 -m venv venv; fi
          . venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pm2 delete backend >/dev/null 2>&1 || true
          pm2 start "venv/bin/gunicorn -w 1 --threads 8 -b 0.0.0.0:5000 --timeout 300 app:app" --name backend
          pm2 save
          sleep 5
          if ! curl -f http://127.0.0.1:5000/api/health; then
            pm2 status
            pm2 logs backend --lines 200 --nostream || true
            exit 1
          fi
          EOFSSH

      - name: Install PostgreSQL client
        if: (github.event_name == 'workflow_dispatch' || github.actor == 'govardhanreddy66') && steps.targets.outputs.database == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Apply database schema
        if: (github.event_name == 'workflow_dispatch' || github.actor == 'govardhanreddy66') && steps.targets.outputs.database == 'true'
        env:
          PGPASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          psql \
            --host="${{ secrets.DB_HOST }}" \
            --port="${{ secrets.DB_PORT }}" \
            --username="${{ secrets.DB_USER }}" \
            --dbname="${{ secrets.DB_NAME }}" \
            --set=ON_ERROR_STOP=1 \
            --file=database/schema.sql

      - name: Upload frontend build
        if: (github.event_name == 'workflow_dispatch' || github.actor == 'govardhanreddy66') && steps.targets.outputs.frontend == 'true'
        run: |
          rsync -avz --delete \
            -e "ssh $SSH_OPTS" \
            frontend/dist/ \
            ${{ secrets.EC2_USER }}@${{ secrets.FRONTEND_HOST }}:/tmp/frontend-dist/

      - name: Publish frontend
        if: (github.event_name == 'workflow_dispatch' || github.actor == 'govardhanreddy66') && steps.targets.outputs.frontend == 'true'
        run: |
          ssh $SSH_OPTS ${{ secrets.EC2_USER }}@${{ secrets.FRONTEND_HOST }} <<'EOFSSH'
          set -e
          APP_DOMAIN="${{ secrets.FRONTEND_DOMAIN }}"
          BACKEND_HOST="${{ secrets.BACKEND_HOST }}"
          BACKEND_TUNNEL_KEY="/tmp/backend-tunnel-key.pem"
          BACKEND_PROXY_HOST="127.0.0.1:5001"
          sudo mkdir -p /var/www/interview
          sudo rsync -av --delete /tmp/frontend-dist/ /var/www/interview/
          cat > "$BACKEND_TUNNEL_KEY" <<'KEYEOF'
          ${{ secrets.EC2_SSH_KEY }}
          KEYEOF
          chmod 600 "$BACKEND_TUNNEL_KEY"
          pkill -f "127.0.0.1:5001:127.0.0.1:5000" || true
          nohup ssh -N -L 127.0.0.1:5001:127.0.0.1:5000 \
            -i "$BACKEND_TUNNEL_KEY" \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=3 \
            ${{ secrets.EC2_USER }}@"$BACKEND_HOST" >/tmp/backend-tunnel.log 2>&1 &
          for i in $(seq 1 10); do
            if curl -fsS --max-time 5 "http://$BACKEND_PROXY_HOST/api/health" >/dev/null; then
              break
            fi
            sleep 2
          done
          export APP_DOMAIN
          export BACKEND_PROXY_HOST
          if [ -n "$APP_DOMAIN" ] && [ -f "/etc/letsencrypt/live/$APP_DOMAIN/fullchain.pem" ] && [ -f "/etc/letsencrypt/live/$APP_DOMAIN/privkey.pem" ]; then
            {
              echo "server {"
              echo "    listen 80;"
              echo "    server_name $APP_DOMAIN;"
              echo '    return 301 https://$host$request_uri;'
              echo "}"
              echo
              echo "server {"
              echo "    listen 443 ssl http2;"
              echo "    server_name $APP_DOMAIN;"
              echo
              echo "    ssl_certificate /etc/letsencrypt/live/$APP_DOMAIN/fullchain.pem;"
              echo "    ssl_certificate_key /etc/letsencrypt/live/$APP_DOMAIN/privkey.pem;"
              echo
              echo "    root /var/www/interview;"
              echo "    index index.html;"
              echo
              echo '    location = /.env { return 404; }'
              echo '    location ^~ /.git/ { return 404; }'
              echo '    location ^~ /.svn/ { return 404; }'
              echo '    location ^~ /.hg/ { return 404; }'
              echo '    location ^~ /vendor/ { return 404; }'
              echo '    location ^~ /cgi-bin/ { return 404; }'
              echo '    location ^~ /wp-admin/ { return 404; }'
              echo '    location ^~ /wp-content/ { return 404; }'
              echo '    location ^~ /wp-includes/ { return 404; }'
              echo '    location ^~ /phpunit/ { return 404; }'
              echo '    location ^~ /phpMyAdmin/ { return 404; }'
              echo '    location ^~ /.well-known/pki-validation/ { return 404; }'
              echo '    location ~* \\.(php|asp|aspx|jsp|cgi|pl|sh)$ { return 404; }'
              echo
              echo "    location / {"
              echo '        try_files $uri $uri/ /index.html;'
              echo "    }"
              echo
              echo "    location /api/ {"
              echo "        proxy_pass http://$BACKEND_PROXY_HOST/api/;"
              echo '        proxy_set_header Host $host;'
              echo '        proxy_set_header X-Real-IP $remote_addr;'
              echo '        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;'
              echo '        proxy_set_header X-Forwarded-Proto $scheme;'
              echo "        proxy_read_timeout 300s;"
              echo "        client_max_body_size 200M;"
              echo "    }"
              echo
              echo "    location /functions/v1/ {"
              echo "        proxy_pass http://$BACKEND_PROXY_HOST/functions/v1/;"
              echo '        proxy_set_header Host $host;'
              echo '        proxy_set_header X-Real-IP $remote_addr;'
              echo '        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;'
              echo '        proxy_set_header X-Forwarded-Proto $scheme;'
              echo "        proxy_read_timeout 300s;"
              echo "        client_max_body_size 200M;"
              echo "    }"
              echo
              echo "    location /socket.io/ {"
              echo "        proxy_pass http://$BACKEND_PROXY_HOST/socket.io/;"
              echo "        proxy_http_version 1.1;"
              echo '        proxy_set_header Upgrade $http_upgrade;'
              echo '        proxy_set_header Connection "upgrade";'
              echo '        proxy_set_header Host $host;'
              echo '        proxy_set_header X-Forwarded-Proto $scheme;'
              echo "        proxy_read_timeout 300s;"
              echo "    }"
              echo
              echo "    location /storage/ {"
              echo "        proxy_pass http://$BACKEND_PROXY_HOST/storage/;"
              echo '        proxy_set_header Host $host;'
              echo '        proxy_set_header X-Real-IP $remote_addr;'
              echo '        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;'
              echo '        proxy_set_header X-Forwarded-Proto $scheme;'
              echo "    }"
              echo "}"
            } >/tmp/interview-nginx.conf
          else
            {
              echo "server {"
              echo "    listen 80;"
              echo "    server_name _;"
              echo
              echo "    root /var/www/interview;"
              echo "    index index.html;"
              echo
              echo '    location = /.env { return 404; }'
              echo '    location ^~ /.git/ { return 404; }'
              echo '    location ^~ /.svn/ { return 404; }'
              echo '    location ^~ /.hg/ { return 404; }'
              echo '    location ^~ /vendor/ { return 404; }'
              echo '    location ^~ /cgi-bin/ { return 404; }'
              echo '    location ^~ /wp-admin/ { return 404; }'
              echo '    location ^~ /wp-content/ { return 404; }'
              echo '    location ^~ /wp-includes/ { return 404; }'
              echo '    location ^~ /phpunit/ { return 404; }'
              echo '    location ^~ /phpMyAdmin/ { return 404; }'
              echo '    location ^~ /.well-known/pki-validation/ { return 404; }'
              echo '    location ~* \\.(php|asp|aspx|jsp|cgi|pl|sh)$ { return 404; }'
              echo
              echo "    location / {"
              echo '        try_files $uri $uri/ /index.html;'
              echo "    }"
              echo
              echo "    location /api/ {"
              echo "        proxy_pass http://$BACKEND_PROXY_HOST/api/;"
              echo '        proxy_set_header Host $host;'
              echo '        proxy_set_header X-Real-IP $remote_addr;'
              echo '        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;'
              echo '        proxy_set_header X-Forwarded-Proto $scheme;'
              echo "        proxy_read_timeout 300s;"
              echo "        client_max_body_size 200M;"
              echo "    }"
              echo
              echo "    location /functions/v1/ {"
              echo "        proxy_pass http://$BACKEND_PROXY_HOST/functions/v1/;"
              echo '        proxy_set_header Host $host;'
              echo '        proxy_set_header X-Real-IP $remote_addr;'
              echo '        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;'
              echo '        proxy_set_header X-Forwarded-Proto $scheme;'
              echo "        proxy_read_timeout 300s;"
              echo "        client_max_body_size 200M;"
              echo "    }"
              echo
              echo "    location /socket.io/ {"
              echo "        proxy_pass http://$BACKEND_PROXY_HOST/socket.io/;"
              echo "        proxy_http_version 1.1;"
              echo '        proxy_set_header Upgrade $http_upgrade;'
              echo '        proxy_set_header Connection "upgrade";'
              echo '        proxy_set_header Host $host;'
              echo '        proxy_set_header X-Forwarded-Proto $scheme;'
              echo "        proxy_read_timeout 300s;"
              echo "    }"
              echo
              echo "    location /storage/ {"
              echo "        proxy_pass http://$BACKEND_PROXY_HOST/storage/;"
              echo '        proxy_set_header Host $host;'
              echo '        proxy_set_header X-Real-IP $remote_addr;'
              echo '        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;'
              echo '        proxy_set_header X-Forwarded-Proto $scheme;'
              echo "    }"
              echo "}"
            } >/tmp/interview-nginx.conf
          fi
          sudo mv /tmp/interview-nginx.conf /etc/nginx/sites-available/interview
          sudo ln -sf /etc/nginx/sites-available/interview /etc/nginx/sites-enabled/interview
          sudo rm -f /etc/nginx/sites-enabled/default
          sudo nginx -t
          sudo systemctl reload nginx
          EOFSSH
