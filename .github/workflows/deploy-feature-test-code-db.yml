name: Manual Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Branch or tag to deploy
        required: true
        default: main
        type: string
      branch_details:
        description: Branch details or release notes
        required: false
        default: ""
        type: string
      code_review_notes:
        description: Code review status or notes
        required: false
        default: ""
        type: string
      deploy_target:
        description: Which part should be deployed?
        required: true
        default: all
        type: choice
        options:
          - all
          - frontend
          - backend
          - database

jobs:
  pre_requirements:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.targets.outputs.frontend }}
      backend: ${{ steps.targets.outputs.backend }}
      database: ${{ steps.targets.outputs.database }}
      selected_ref: ${{ github.event.inputs.git_ref }}
      deploy_target: ${{ github.event.inputs.deploy_target }}

    steps:
      - name: 1. Pre Requirements - Checkout Selected Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.git_ref }}

      - name: 1. Pre Requirements - Capture Branch Details and Code Review Notes
        run: |
          {
            echo "## 1. Pre Requirements"
            echo "- Selected ref: \`${{ github.event.inputs.git_ref }}\`"
            echo "- Deploy target: \`${{ github.event.inputs.deploy_target }}\`"
            echo "- Branch details: ${{ github.event.inputs.branch_details || 'Not provided' }}"
            echo "- Code review notes: ${{ github.event.inputs.code_review_notes || 'Not provided' }}"
            echo "- Requested by: \`${{ github.actor }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 1. Pre Requirements - Detect Changed Areas
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
            database:
              - 'database/**'

      - name: 1. Pre Requirements - Resolve Deployment Targets
        id: targets
        run: |
          target="${{ github.event.inputs.deploy_target }}"
          case "$target" in
            all)
              frontend=true
              backend=true
              database=true
              ;;
            frontend)
              frontend=true
              backend=false
              database=false
              ;;
            backend)
              frontend=false
              backend=true
              database=false
              ;;
            database)
              frontend=false
              backend=false
              database=true
              ;;
          esac

          echo "frontend=$frontend" >> "$GITHUB_OUTPUT"
          echo "backend=$backend" >> "$GITHUB_OUTPUT"
          echo "database=$database" >> "$GITHUB_OUTPUT"
          echo "Detected targets -> frontend=$frontend backend=$backend database=$database"
          {
            echo "### Selected Components"
            echo "- Frontend: \`$frontend\`"
            echo "- Backend: \`$backend\`"
            echo "- Database: \`$database\`"
            echo "### Changed Areas On Selected Ref"
            echo "- Frontend files changed: \`${{ steps.changes.outputs.frontend }}\`"
            echo "- Backend files changed: \`${{ steps.changes.outputs.backend }}\`"
            echo "- Database files changed: \`${{ steps.changes.outputs.database }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  pre_build:
    name: 2. Pre Build
    runs-on: ubuntu-latest
    needs: pre_requirements
    steps:
      - name: 2. Pre Build - Checkout Selected Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.pre_requirements.outputs.selected_ref }}

      - name: 2. Pre Build - Validate Tooling
        run: |
          python3 --version
          node --version
          npm --version
          {
            echo "## 2. Pre Build"
            echo "- Python, Node, and npm are available on the runner."
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    name: 3. Build
    runs-on: ubuntu-latest
    needs: [pre_requirements, pre_build]
    steps:
      - name: 3. Build - Checkout Selected Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.pre_requirements.outputs.selected_ref }}

      - name: 3. Build - Setup Node
        if: needs.pre_requirements.outputs.frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: current

      - name: 3. Build - Build Frontend
        if: needs.pre_requirements.outputs.frontend == 'true'
        working-directory: frontend
        run: |
          echo "VITE_API_BASE_URL=/api" > .env
          echo "VITE_STORAGE_URL=/storage" >> .env
          npm install --legacy-peer-deps
          npm run build
          {
            echo "## 3. Build"
            echo "- Frontend build completed successfully."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 3. Build - Upload Frontend Artifact
        if: needs.pre_requirements.outputs.frontend == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error

      - name: 3. Build - Skip Frontend Build When Not Requested
        if: needs.pre_requirements.outputs.frontend != 'true'
        run: |
          echo "Frontend build skipped because deploy target does not include frontend."
          {
            echo "## 3. Build"
            echo "- Frontend build skipped."
          } >> "$GITHUB_STEP_SUMMARY"

  deployment_approval:
    name: 4. Approval for Deployment
    runs-on: ubuntu-latest
    needs: [pre_requirements, pre_build, build]
    environment:
      name: production
    steps:
      - name: 4. Approval for Deployment - Record Approval
        run: |
          echo "Deployment approved for ref ${{ needs.pre_requirements.outputs.selected_ref }} by ${{ github.actor }}."
          {
            echo "## 4. Approval for Deployment"
            echo "- Production deployment approved."
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: 5. Environment and 6. Deploy
    runs-on: ubuntu-latest
    needs: [pre_requirements, pre_build, build, deployment_approval]
    concurrency:
      group: deploy-feature-test-code-db-production
      cancel-in-progress: false

    steps:
      - name: 5. Environment - Checkout Selected Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.pre_requirements.outputs.selected_ref }}

      - name: 5. Environment - Download Frontend Build Artifact
        if: needs.pre_requirements.outputs.frontend == 'true'
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: 5. Environment - Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key.pem
          chmod 400 ~/.ssh/deploy_key.pem
          {
            echo "## 5. Environment"
            echo "- Selected ref: \`${{ needs.pre_requirements.outputs.selected_ref }}\`"
            echo "- Frontend host: \`${{ secrets.FRONTEND_HOST }}\`"
            echo "- Backend host: \`${{ secrets.BACKEND_HOST }}\`"
            echo "- Deploy target: \`${{ needs.pre_requirements.outputs.deploy_target }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 5. Environment - Define SSH Options
        run: |
          echo 'SSH_OPTS=-i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=15' >> "$GITHUB_ENV"

      - name: 6. Deploy - Sync Backend Source
        if: needs.pre_requirements.outputs.backend == 'true'
        run: |
          BACKEND_RELEASE="/apps/backend/releases/${{ github.sha }}"
          ssh $SSH_OPTS ${{ secrets.EC2_USER }}@${{ secrets.BACKEND_HOST }} "mkdir -p $BACKEND_RELEASE"
          rsync -avz --delete \
            -e "ssh $SSH_OPTS" \
            backend/ \
            ${{ secrets.EC2_USER }}@${{ secrets.BACKEND_HOST }}:$BACKEND_RELEASE/

      - name: 6. Deploy - Configure Backend and Restart
        if: needs.pre_requirements.outputs.backend == 'true'
        run: |
          ssh $SSH_OPTS ${{ secrets.EC2_USER }}@${{ secrets.BACKEND_HOST }} <<'EOFSSH'
          set -e
          RELEASE_ID="${{ github.sha }}"
          APP_ROOT="/apps/backend"
          RELEASES_DIR="$APP_ROOT/releases"
          SHARED_DIR="$APP_ROOT/shared"
          VENV_DIR="$APP_ROOT/venv"
          NEW_RELEASE="$RELEASES_DIR/$RELEASE_ID"
          PREVIOUS_RELEASE="$(readlink -f "$APP_ROOT/current" || true)"
          APP_DOMAIN="${{ secrets.FRONTEND_DOMAIN }}"
          PUBLIC_ORIGIN="http://${{ secrets.FRONTEND_HOST }}"
          if [ -n "$APP_DOMAIN" ]; then
            PUBLIC_ORIGIN="https://$APP_DOMAIN"
          fi
          mkdir -p "$RELEASES_DIR" "$SHARED_DIR"
          cat > "$SHARED_DIR/.env" <<ENVEOF
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          DOMAIN=$PUBLIC_ORIGIN
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          SMTP_USE_SSL=${{ secrets.SMTP_USE_SSL }}
          MAIL_FROM=${{ secrets.MAIL_FROM }}
          STORAGE_PATH=/apps/storage
          PUBLIC_STORAGE_URL=$PUBLIC_ORIGIN/storage
          WHISPER_MODEL=base
          UPLOAD_FOLDER=/apps/storage
          MAX_CONTENT_MB=200
          BACKEND_API_BASE=http://127.0.0.1:5000
          ENVEOF
          ln -sfn "$SHARED_DIR/.env" "$NEW_RELEASE/.env"
          if [ ! -d "$VENV_DIR" ]; then python3 -m venv "$VENV_DIR"; fi
          . "$VENV_DIR/bin/activate"
          pip install --upgrade pip
          pip install -r "$NEW_RELEASE/requirements.txt"
          ln -sfn "$NEW_RELEASE" "$APP_ROOT/current"
          pm2 delete backend >/dev/null 2>&1 || true
          pm2 start "cd $APP_ROOT/current && $VENV_DIR/bin/gunicorn -w 1 --threads 8 -b 0.0.0.0:5000 --timeout 300 app:app" --name backend
          pm2 save
          sleep 5
          if ! curl -f http://127.0.0.1:5000/api/health; then
            pm2 status
            pm2 logs backend --lines 200 --nostream || true
            if [ -n "$PREVIOUS_RELEASE" ] && [ -d "$PREVIOUS_RELEASE" ]; then
              echo "Rolling back backend to $PREVIOUS_RELEASE"
              ln -sfn "$PREVIOUS_RELEASE" "$APP_ROOT/current"
              pm2 delete backend >/dev/null 2>&1 || true
              pm2 start "cd $APP_ROOT/current && $VENV_DIR/bin/gunicorn -w 1 --threads 8 -b 0.0.0.0:5000 --timeout 300 app:app" --name backend
              pm2 save
              sleep 5
              curl -f http://127.0.0.1:5000/api/health
            fi
            exit 1
          fi
          EOFSSH

      - name: 6. Deploy - Sync Database Source
        if: needs.pre_requirements.outputs.database == 'true'
        run: |
          DATABASE_RELEASE="/apps/database/releases/${{ github.sha }}"
          ssh $SSH_OPTS ${{ secrets.EC2_USER }}@${{ secrets.BACKEND_HOST }} "mkdir -p $DATABASE_RELEASE"
          rsync -avz --delete \
            -e "ssh $SSH_OPTS" \
            database/ \
            ${{ secrets.EC2_USER }}@${{ secrets.BACKEND_HOST }}:$DATABASE_RELEASE/

      - name: 6. Deploy - Apply Database Schema
        if: needs.pre_requirements.outputs.database == 'true'
        run: |
          ssh $SSH_OPTS ${{ secrets.EC2_USER }}@${{ secrets.BACKEND_HOST }} <<'EOFSSH'
          set -e
          DATABASE_RELEASE="/apps/database/releases/${{ github.sha }}"
          export PGPASSWORD="${{ secrets.DB_PASSWORD }}"
          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y postgresql-client
          fi
          SERVER_MAJOR="$(
            psql \
              --host="${{ secrets.DB_HOST }}" \
              --port="${{ secrets.DB_PORT }}" \
              --username="${{ secrets.DB_USER }}" \
              --dbname="${{ secrets.DB_NAME }}" \
              --tuples-only \
              --no-align \
              --command="SHOW server_version;" | cut -d. -f1 | tr -d '[:space:]'
          )"
          if [ -z "$SERVER_MAJOR" ]; then
            echo "Unable to detect PostgreSQL server version"
            exit 1
          fi
          PG_BINDIR="/usr/lib/postgresql/$SERVER_MAJOR/bin"
          if [ ! -x "$PG_BINDIR/pg_dump" ] || [ ! -x "$PG_BINDIR/psql" ] || [ ! -x "$PG_BINDIR/pg_restore" ]; then
            sudo apt-get update
            sudo apt-get install -y ca-certificates curl gnupg lsb-release
            if [ ! -f /etc/apt/sources.list.d/pgdg.list ]; then
              echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | \
                sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null
            fi
            if [ ! -f /usr/share/keyrings/postgresql.gpg ]; then
              curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | \
                gpg --dearmor | sudo tee /usr/share/keyrings/postgresql.gpg >/dev/null
            fi
            sudo apt-get update
            sudo apt-get install -y "postgresql-client-$SERVER_MAJOR"
          fi
          BACKUP_FILE="/tmp/interviewcoach-db-${{ github.sha }}.dump"
          "$PG_BINDIR/pg_dump" \
            --host="${{ secrets.DB_HOST }}" \
            --port="${{ secrets.DB_PORT }}" \
            --username="${{ secrets.DB_USER }}" \
            --dbname="${{ secrets.DB_NAME }}" \
            --format=custom \
            --file="$BACKUP_FILE"
          restore_database() {
            echo "Rolling back database from $BACKUP_FILE"
            "$PG_BINDIR/pg_restore" \
              --host="${{ secrets.DB_HOST }}" \
              --port="${{ secrets.DB_PORT }}" \
              --username="${{ secrets.DB_USER }}" \
              --dbname="${{ secrets.DB_NAME }}" \
              --clean \
              --if-exists \
              --no-owner \
              --no-privileges \
              "$BACKUP_FILE"
          }
          trap restore_database ERR
          "$PG_BINDIR/psql" \
            --host="${{ secrets.DB_HOST }}" \
            --port="${{ secrets.DB_PORT }}" \
            --username="${{ secrets.DB_USER }}" \
            --dbname="${{ secrets.DB_NAME }}" \
            --set=ON_ERROR_STOP=1 \
            --single-transaction \
            --file="$DATABASE_RELEASE/schema.sql"
          rm -f "$BACKUP_FILE"
          EOFSSH

      - name: 6. Deploy - Upload Frontend Build
        if: needs.pre_requirements.outputs.frontend == 'true'
        run: |
          rsync -avz --delete \
            -e "ssh $SSH_OPTS" \
            frontend/dist/ \
            ${{ secrets.EC2_USER }}@${{ secrets.FRONTEND_HOST }}:/tmp/frontend-dist/

      - name: 6. Deploy - Publish Frontend
        if: needs.pre_requirements.outputs.frontend == 'true'
        run: |
          ssh $SSH_OPTS ${{ secrets.EC2_USER }}@${{ secrets.FRONTEND_HOST }} <<'EOFSSH'
          set -e
          RELEASE_ID="${{ github.sha }}"
          FRONTEND_ROOT="/var/www/interview"
          RELEASES_DIR="$FRONTEND_ROOT/releases"
          CURRENT_LINK="$FRONTEND_ROOT/current"
          PREVIOUS_RELEASE="$(readlink -f "$CURRENT_LINK" || true)"
          NEW_RELEASE="$RELEASES_DIR/$RELEASE_ID"
          APP_DOMAIN="${{ secrets.FRONTEND_DOMAIN }}"
          BACKEND_HOST="${{ secrets.BACKEND_HOST }}"
          BACKEND_TUNNEL_KEY="/tmp/backend-tunnel-key.pem"
          BACKEND_PROXY_HOST="127.0.0.1:5001"
          sudo mkdir -p "$RELEASES_DIR"
          sudo rsync -av --delete /tmp/frontend-dist/ "$NEW_RELEASE/"
          cat > "$BACKEND_TUNNEL_KEY" <<'KEYEOF'
          ${{ secrets.EC2_SSH_KEY }}
          KEYEOF
          chmod 600 "$BACKEND_TUNNEL_KEY"
          EXISTING_TUNNEL_PID="$(ss -ltnp 2>/dev/null | awk '/127.0.0.1:5001/ && /ssh/ { if (match($0, /pid=([0-9]+)/, pid)) print pid[1] }' | head -n 1)"
          if [ -n "$EXISTING_TUNNEL_PID" ]; then
            kill "$EXISTING_TUNNEL_PID" || true
            sleep 1
          fi
          ssh -f -N -L 127.0.0.1:5001:127.0.0.1:5000 \
            -i "$BACKEND_TUNNEL_KEY" \
            -o ExitOnForwardFailure=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=3 \
            ${{ secrets.EC2_USER }}@"$BACKEND_HOST"
          for i in $(seq 1 10); do
            if curl -fsS --max-time 5 "http://$BACKEND_PROXY_HOST/api/health" >/dev/null; then
              break
            fi
            sleep 2
          done
          export APP_DOMAIN
          export BACKEND_PROXY_HOST
          if [ -n "$APP_DOMAIN" ] && [ -f "/etc/letsencrypt/live/$APP_DOMAIN/fullchain.pem" ] && [ -f "/etc/letsencrypt/live/$APP_DOMAIN/privkey.pem" ]; then
            {
              echo "server {"
              echo "    listen 80;"
              echo "    server_name $APP_DOMAIN;"
              echo '    return 301 https://$host$request_uri;'
              echo "}"
              echo
              echo "server {"
              echo "    listen 443 ssl http2;"
              echo "    server_name $APP_DOMAIN;"
              echo
              echo "    ssl_certificate /etc/letsencrypt/live/$APP_DOMAIN/fullchain.pem;"
              echo "    ssl_certificate_key /etc/letsencrypt/live/$APP_DOMAIN/privkey.pem;"
              echo "    gzip on;"
              echo '    gzip_vary on;'
              echo '    gzip_proxied any;'
              echo '    gzip_comp_level 6;'
              echo '    gzip_min_length 1024;'
              echo '    gzip_types text/plain text/css application/json application/javascript text/javascript application/xml text/xml image/svg+xml;'
              echo
              echo "    root $CURRENT_LINK;"
              echo "    index index.html;"
              echo
              echo '    location = /.env { return 404; }'
              echo '    location ^~ /.git/ { return 404; }'
              echo '    location ^~ /.svn/ { return 404; }'
              echo '    location ^~ /.hg/ { return 404; }'
              echo '    location ^~ /vendor/ { return 404; }'
              echo '    location ^~ /cgi-bin/ { return 404; }'
              echo '    location ^~ /wp-admin/ { return 404; }'
              echo '    location ^~ /wp-content/ { return 404; }'
              echo '    location ^~ /wp-includes/ { return 404; }'
              echo '    location ^~ /phpunit/ { return 404; }'
              echo '    location ^~ /phpMyAdmin/ { return 404; }'
              echo '    location ^~ /.well-known/pki-validation/ { return 404; }'
              echo '    location ~* \\.(php|asp|aspx|jsp|cgi|pl|sh)$ { return 404; }'
              echo
              echo "    location = /index.html {"
              echo '        add_header Cache-Control "no-store, no-cache, must-revalidate" always;'
              echo '        try_files $uri =404;'
              echo "    }"
              echo
              echo "    location ~* \\.(js|mjs|css|map|json|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2|ttf|eot)$ {"
              echo '        try_files $uri =404;'
              echo '        expires 1y;'
              echo '        add_header Cache-Control "public, immutable" always;'
              echo "    }"
              echo
              echo "    location / {"
              echo '        add_header Cache-Control "no-store, no-cache, must-revalidate" always;'
              echo '        try_files $uri $uri/ /index.html;'
              echo "    }"
              echo
              echo "    location /api/ {"
              echo "        proxy_pass http://$BACKEND_PROXY_HOST/api/;"
              echo '        proxy_set_header Host $host;'
              echo '        proxy_set_header X-Real-IP $remote_addr;'
              echo '        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;'
              echo '        proxy_set_header X-Forwarded-Proto $scheme;'
              echo "        proxy_read_timeout 300s;"
              echo "        client_max_body_size 200M;"
              echo "    }"
              echo
              echo "    location /functions/v1/ {"
              echo "        proxy_pass http://$BACKEND_PROXY_HOST/functions/v1/;"
              echo '        proxy_set_header Host $host;'
              echo '        proxy_set_header X-Real-IP $remote_addr;'
              echo '        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;'
              echo '        proxy_set_header X-Forwarded-Proto $scheme;'
              echo "        proxy_read_timeout 300s;"
              echo "        client_max_body_size 200M;"
              echo "    }"
              echo
              echo "    location /socket.io/ {"
              echo "        proxy_pass http://$BACKEND_PROXY_HOST/socket.io/;"
              echo "        proxy_http_version 1.1;"
              echo '        proxy_set_header Upgrade $http_upgrade;'
              echo '        proxy_set_header Connection "upgrade";'
              echo '        proxy_set_header Host $host;'
              echo '        proxy_set_header X-Forwarded-Proto $scheme;'
              echo "        proxy_read_timeout 300s;"
              echo "    }"
              echo
              echo "    location /storage/ {"
              echo "        proxy_pass http://$BACKEND_PROXY_HOST/storage/;"
              echo '        proxy_set_header Host $host;'
              echo '        proxy_set_header X-Real-IP $remote_addr;'
              echo '        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;'
              echo '        proxy_set_header X-Forwarded-Proto $scheme;'
              echo "    }"
              echo "}"
            } >/tmp/interview-nginx.conf
          else
            {
              echo "server {"
              echo "    listen 80;"
              echo "    server_name _;"
              echo "    gzip on;"
              echo '    gzip_vary on;'
              echo '    gzip_proxied any;'
              echo '    gzip_comp_level 6;'
              echo '    gzip_min_length 1024;'
              echo '    gzip_types text/plain text/css application/json application/javascript text/javascript application/xml text/xml image/svg+xml;'
              echo
              echo "    root $CURRENT_LINK;"
              echo "    index index.html;"
              echo
              echo '    location = /.env { return 404; }'
              echo '    location ^~ /.git/ { return 404; }'
              echo '    location ^~ /.svn/ { return 404; }'
              echo '    location ^~ /.hg/ { return 404; }'
              echo '    location ^~ /vendor/ { return 404; }'
              echo '    location ^~ /cgi-bin/ { return 404; }'
              echo '    location ^~ /wp-admin/ { return 404; }'
              echo '    location ^~ /wp-content/ { return 404; }'
              echo '    location ^~ /wp-includes/ { return 404; }'
              echo '    location ^~ /phpunit/ { return 404; }'
              echo '    location ^~ /phpMyAdmin/ { return 404; }'
              echo '    location ^~ /.well-known/pki-validation/ { return 404; }'
              echo '    location ~* \\.(php|asp|aspx|jsp|cgi|pl|sh)$ { return 404; }'
              echo
              echo "    location = /index.html {"
              echo '        add_header Cache-Control "no-store, no-cache, must-revalidate" always;'
              echo '        try_files $uri =404;'
              echo "    }"
              echo
              echo "    location ~* \\.(js|mjs|css|map|json|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2|ttf|eot)$ {"
              echo '        try_files $uri =404;'
              echo '        expires 1y;'
              echo '        add_header Cache-Control "public, immutable" always;'
              echo "    }"
              echo
              echo "    location / {"
              echo '        add_header Cache-Control "no-store, no-cache, must-revalidate" always;'
              echo '        try_files $uri $uri/ /index.html;'
              echo "    }"
              echo
              echo "    location /api/ {"
              echo "        proxy_pass http://$BACKEND_PROXY_HOST/api/;"
              echo '        proxy_set_header Host $host;'
              echo '        proxy_set_header X-Real-IP $remote_addr;'
              echo '        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;'
              echo '        proxy_set_header X-Forwarded-Proto $scheme;'
              echo "        proxy_read_timeout 300s;"
              echo "        client_max_body_size 200M;"
              echo "    }"
              echo
              echo "    location /functions/v1/ {"
              echo "        proxy_pass http://$BACKEND_PROXY_HOST/functions/v1/;"
              echo '        proxy_set_header Host $host;'
              echo '        proxy_set_header X-Real-IP $remote_addr;'
              echo '        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;'
              echo '        proxy_set_header X-Forwarded-Proto $scheme;'
              echo "        proxy_read_timeout 300s;"
              echo "        client_max_body_size 200M;"
              echo "    }"
              echo
              echo "    location /socket.io/ {"
              echo "        proxy_pass http://$BACKEND_PROXY_HOST/socket.io/;"
              echo "        proxy_http_version 1.1;"
              echo '        proxy_set_header Upgrade $http_upgrade;'
              echo '        proxy_set_header Connection "upgrade";'
              echo '        proxy_set_header Host $host;'
              echo '        proxy_set_header X-Forwarded-Proto $scheme;'
              echo "        proxy_read_timeout 300s;"
              echo "    }"
              echo
              echo "    location /storage/ {"
              echo "        proxy_pass http://$BACKEND_PROXY_HOST/storage/;"
              echo '        proxy_set_header Host $host;'
              echo '        proxy_set_header X-Real-IP $remote_addr;'
              echo '        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;'
              echo '        proxy_set_header X-Forwarded-Proto $scheme;'
              echo "    }"
              echo "}"
            } >/tmp/interview-nginx.conf
          fi
          sudo mv /tmp/interview-nginx.conf /etc/nginx/sites-available/interview
          sudo ln -sf /etc/nginx/sites-available/interview /etc/nginx/sites-enabled/interview
          sudo rm -f /etc/nginx/sites-enabled/default
          sudo ln -sfn "$NEW_RELEASE" "$CURRENT_LINK"
          sudo nginx -t
          sudo systemctl reload nginx
          if ! curl -fsS --max-time 10 http://127.0.0.1/ >/dev/null || ! curl -fsS --max-time 10 "http://$BACKEND_PROXY_HOST/api/health" >/dev/null; then
            if [ -n "$PREVIOUS_RELEASE" ] && [ -d "$PREVIOUS_RELEASE" ]; then
              echo "Rolling back frontend to $PREVIOUS_RELEASE"
              sudo ln -sfn "$PREVIOUS_RELEASE" "$CURRENT_LINK"
              sudo nginx -t
              sudo systemctl reload nginx
            fi
            exit 1
          fi
          EOFSSH

  status:
    name: 7. Status
    runs-on: ubuntu-latest
    needs: [pre_requirements, deploy]
    steps:
      - name: 7. Status - Report Deployment Status
        env:
          FRONTEND_DOMAIN: ${{ secrets.FRONTEND_DOMAIN }}
          FRONTEND_HOST: ${{ secrets.FRONTEND_HOST }}
        run: |
          if [ -n "$FRONTEND_DOMAIN" ]; then
            FRONTEND_ORIGIN="https://$FRONTEND_DOMAIN"
          else
            FRONTEND_ORIGIN="http://$FRONTEND_HOST"
          fi

          {
            echo "## 7. Status"
            echo "- Selected ref: \`${{ needs.pre_requirements.outputs.selected_ref }}\`"
            echo "- Deploy target: \`${{ needs.pre_requirements.outputs.deploy_target }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ needs.pre_requirements.outputs.frontend }}" = "true" ]; then
            curl -fsS --max-time 15 "$FRONTEND_ORIGIN/" >/dev/null
            echo "- Frontend check: success ($FRONTEND_ORIGIN/)" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "${{ needs.pre_requirements.outputs.backend }}" = "true" ] || [ "${{ needs.pre_requirements.outputs.frontend }}" = "true" ]; then
            curl -fsS --max-time 15 "$FRONTEND_ORIGIN/api/health" >/dev/null
            echo "- Backend health check: success ($FRONTEND_ORIGIN/api/health)" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "${{ needs.pre_requirements.outputs.database }}" = "true" ]; then
            echo "- Database deployment stage completed. Review deploy logs for schema application details." >> "$GITHUB_STEP_SUMMARY"
          fi

  merge_to_main_approval:
    name: 8. Approval for Code Merge to Main Branch Only
    runs-on: ubuntu-latest
    needs: [pre_requirements, status]
    if: ${{ needs.pre_requirements.outputs.selected_ref != 'main' }}
    environment:
      name: main-merge-approval
    steps:
      - name: 8. Approval for Code Merge to Main Branch Only - Record Approval
        run: |
          {
            echo "## 8. Approval for Code Merge to Main Branch Only"
            echo "- Branch \`${{ needs.pre_requirements.outputs.selected_ref }}\` is approved for merge review into \`main\`."
            echo "- This workflow does not merge automatically; it records approval only."
          } >> "$GITHUB_STEP_SUMMARY"
