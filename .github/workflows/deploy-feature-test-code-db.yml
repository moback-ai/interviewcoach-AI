name: Deploy Feature Branch

on:
  push:
    branches:
      - feature/test-code-DB
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: current

      - name: Build frontend
        working-directory: frontend
        run: |
          echo "VITE_API_BASE_URL=/api" > .env
          echo "VITE_STORAGE_URL=/storage" >> .env
          npm install --legacy-peer-deps
          npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key.pem
          chmod 400 ~/.ssh/deploy_key.pem

      - name: Define SSH options
        run: |
          echo 'SSH_OPTS=-i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=15' >> "$GITHUB_ENV"

      - name: Sync backend source
        run: |
          rsync -avz --delete \
            -e "ssh $SSH_OPTS" \
            backend/ \
            ${{ secrets.EC2_USER }}@${{ secrets.BACKEND_HOST }}:/apps/backend/

      - name: Configure backend and restart
        run: |
          ssh $SSH_OPTS ${{ secrets.EC2_USER }}@${{ secrets.BACKEND_HOST }} <<'EOFSSH'
          set -e
          APP_DOMAIN="${{ secrets.FRONTEND_DOMAIN }}"
          PUBLIC_ORIGIN="http://${{ secrets.FRONTEND_HOST }}"
          if [ -n "$APP_DOMAIN" ]; then
            PUBLIC_ORIGIN="https://$APP_DOMAIN"
          fi
          cat > /apps/backend/.env <<ENVEOF
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          DOMAIN=$PUBLIC_ORIGIN
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          SMTP_USE_SSL=${{ secrets.SMTP_USE_SSL }}
          MAIL_FROM=${{ secrets.MAIL_FROM }}
          STORAGE_PATH=/apps/storage
          PUBLIC_STORAGE_URL=$PUBLIC_ORIGIN/storage
          WHISPER_MODEL=base
          UPLOAD_FOLDER=/apps/storage
          MAX_CONTENT_MB=200
          BACKEND_API_BASE=http://127.0.0.1:5000
          ENVEOF
          cd /apps/backend
          if [ ! -d venv ]; then python3 -m venv venv; fi
          . venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pm2 delete backend >/dev/null 2>&1 || true
          pm2 start "venv/bin/gunicorn -w 2 -b 127.0.0.1:5000 --timeout 300 --worker-class eventlet app:app" --name backend
          pm2 save
          sleep 5
          if ! curl -f http://127.0.0.1:5000/api/health; then
            pm2 status
            pm2 logs backend --lines 200 --nostream || true
            exit 1
          fi
          EOFSSH

      - name: Upload frontend build
        run: |
          rsync -avz --delete \
            -e "ssh $SSH_OPTS" \
            frontend/dist/ \
            ${{ secrets.EC2_USER }}@${{ secrets.FRONTEND_HOST }}:/tmp/frontend-dist/

      - name: Publish frontend
        run: |
          ssh $SSH_OPTS ${{ secrets.EC2_USER }}@${{ secrets.FRONTEND_HOST }} <<'EOFSSH'
          set -e
          APP_DOMAIN="${{ secrets.FRONTEND_DOMAIN }}"
          BACKEND_HOST="${{ secrets.BACKEND_HOST }}"
          sudo mkdir -p /var/www/interview
          sudo rsync -av --delete /tmp/frontend-dist/ /var/www/interview/
          if [ -n "$APP_DOMAIN" ] && [ -f "/etc/letsencrypt/live/$APP_DOMAIN/fullchain.pem" ] && [ -f "/etc/letsencrypt/live/$APP_DOMAIN/privkey.pem" ]; then
            sudo tee /etc/nginx/sites-available/interview >/dev/null <<NGINX
            server {
                listen 80;
                server_name $APP_DOMAIN;
                return 301 https://\$host\$request_uri;
            }

            server {
                listen 443 ssl http2;
                server_name $APP_DOMAIN;

                ssl_certificate /etc/letsencrypt/live/$APP_DOMAIN/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/$APP_DOMAIN/privkey.pem;

                root /var/www/interview;
                index index.html;

                location / {
                    try_files \$uri \$uri/ /index.html;
                }

                location /api/ {
                    proxy_pass http://$BACKEND_HOST:5000/api/;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                    proxy_read_timeout 300s;
                    client_max_body_size 200M;
                }

                location /functions/v1/ {
                    proxy_pass http://$BACKEND_HOST:5000/functions/v1/;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                    proxy_read_timeout 300s;
                    client_max_body_size 200M;
                }

                location /socket.io/ {
                    proxy_pass http://$BACKEND_HOST:5000/socket.io/;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade \$http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_set_header Host \$host;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                    proxy_read_timeout 300s;
                }

                location /storage/ {
                    proxy_pass http://$BACKEND_HOST:5000/storage/;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                }
            }
            NGINX
          else
            sudo tee /etc/nginx/sites-available/interview >/dev/null <<NGINX
            server {
                listen 80;
                server_name _;

                root /var/www/interview;
                index index.html;

                location / {
                    try_files \$uri \$uri/ /index.html;
                }

                location /api/ {
                    proxy_pass http://$BACKEND_HOST:5000/api/;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                    proxy_read_timeout 300s;
                    client_max_body_size 200M;
                }

                location /functions/v1/ {
                    proxy_pass http://$BACKEND_HOST:5000/functions/v1/;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                    proxy_read_timeout 300s;
                    client_max_body_size 200M;
                }

                location /socket.io/ {
                    proxy_pass http://$BACKEND_HOST:5000/socket.io/;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade \$http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_set_header Host \$host;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                    proxy_read_timeout 300s;
                }

                location /storage/ {
                    proxy_pass http://$BACKEND_HOST:5000/storage/;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                }
            }
            NGINX
          fi
          sudo ln -sf /etc/nginx/sites-available/interview /etc/nginx/sites-enabled/interview
          sudo rm -f /etc/nginx/sites-enabled/default
          sudo nginx -t
          sudo systemctl reload nginx
          EOFSSH
